name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git branch -a --contains "$GITHUB_SHA" | grep -qE '(^|\s)main$|origin/main' || {
            echo "::error::Tag must point to a commit on main. Aborting."
            exit 1
          }

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Package tarball
        run: npm pack

      - name: Compute checksums
        run: |
          sha256sum dan8oren-mcp-apple-notes-*.tgz > checksums-sha256.txt
          sha256sum dist/index.js >> checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dan8oren-mcp-apple-notes-*.tgz
            checksums-sha256.txt

      - name: Publish to npm
        run: npm publish --access public
