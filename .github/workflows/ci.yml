name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit --esModuleInterop --target es2022 --module nodenext --moduleResolution nodenext --skipLibCheck --experimentalDecorators

      - name: Check formatting
        run: npx prettier --check "**/*.{ts,mjs,json,md}" --ignore-path .gitignore

      - name: Build
        run: npx tsx --version && npx tsx -e "console.log('build ok')"
